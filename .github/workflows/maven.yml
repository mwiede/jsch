# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore: 
      - '**.md'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Cache local Maven repository
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.m2/repository
          ~/.m2/wrapper
        key: ${{ runner.os }}-build-maven-${{ hashFiles('**/pom.xml', '**/maven-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-build-maven-
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'temurin'
        java-version: '25'
        check-latest: true
    - name: Build with Maven
      run: ./mvnw -B -V -e verify -DskipTests=true -DskipITs=true
    - name: Archive target directory
      run: tar -cf target.tar target
    - name: Upload target directory archive
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: build_target
        path: target.tar
  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['8', '11', '17', '21', '25']
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Cache local Maven repository
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.m2/repository
          ~/.m2/wrapper
        key: ${{ runner.os }}-test-${{ matrix.java }}-maven-${{ hashFiles('**/pom.xml', '**/maven-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-test-${{ matrix.java }}-maven-
    - name: Generate list of JDKs to install
      id: jdks_to_install
      run: |
        maven_jdk=25
        matrix_java="${{ matrix.java }}"
        echo 'list<<EOF' >> "$GITHUB_OUTPUT"
        echo "$matrix_java" >> "$GITHUB_OUTPUT"
        [ "$maven_jdk" != "$matrix_java" ] && echo "$maven_jdk" >> "$GITHUB_OUTPUT"
        echo 'EOF' >> "$GITHUB_OUTPUT"
    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: 'temurin'
        java-version: ${{ steps.jdks_to_install.outputs.list }}
        check-latest: true
    - name: Download target directory archive
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build_target
    - name: Extract target directory archive
      run: tar -xmf target.tar
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
    - name: Build OpenEuler ShangMi base image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: src/test/resources/docker
        file: src/test/resources/docker/Dockerfile.openeuler.shangmi.base
        tags: jsch-openeuler-sshd-base:latest
        load: true
        push: false
        cache-from: type=gha,scope=openeuler-base
        cache-to: type=gha,mode=max,scope=openeuler-base
    - name: Test with Maven
      run: |
        LOWER_JDK="${{ matrix.java }}"
        UPPER_JDK=$((LOWER_JDK+1))
        ./mvnw -B -V -e -Pcoverage verify -Dtoolchain.jdk.version="[$LOWER_JDK,$UPPER_JDK)" -Dmaven.resources.skip=true -Dflatten.skip=true -Dmaven.main.skip=true -Dbnd.skip=true -Dassembly.skipAssembly=true -Dmaven.javadoc.skip=true -Dcyclonedx.skip=true -Dspdx.skip=true -Dformatter.skip=true -Dforbiddenapis.skip=true -DskipTests=false -DskipITs=false
    - name: Upload test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: java-${{ matrix.java }}-testresults
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
          **/target/site/jacoco/
          **/target/site/jacoco-it/
      if: always()
